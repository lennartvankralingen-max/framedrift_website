<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Key-art - Framedrift</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
  <style>
    @font-face { font-family:'Joyride'; src:url('../fonts/JoyrideSTD.otf') format('opentype'); font-weight:400; font-style:normal; font-display:swap; }
    @font-face { font-family:'JoyrideALT'; src:url('../fonts/JoyrideALT.otf') format('opentype'); font-weight:400; font-style:normal; font-display:swap; }
    @font-face { font-family:'Joyride'; src:url('../fonts/JoyrideSTDItalic.otf') format('opentype'); font-weight:400; font-style:italic; font-display:swap; }
    @font-face { font-family:'Joyride'; src:url('../fonts/JoyrideEXT.otf') format('opentype'); font-weight:700; font-style:normal; font-display:swap; }
    @font-face { font-family:'Joyride'; src:url('../fonts/JoyrideEXTItalic.otf') format('opentype'); font-weight:700; font-style:italic; font-display:swap; }
    @media(hover:none) and (pointer:coarse){
      .cursor,.cursor-ring{display:none!important}
      body{cursor:auto}
    }
  </style>
  <style>
    html,body,div,span,h1,h2,h3,h4,p,a,ul,li,article,aside,footer,header,nav,section,em,strong{border:0;font:inherit;font-size:100%;margin:0;padding:0;vertical-align:baseline}
    *,*::after,*::before{box-sizing:border-box}
    ::-webkit-scrollbar{display:none}
    :root{--color-ivory:#fffbf2;--color-sun:#daff00;--color-coal:#242424;--color-void:#000;--ease-out-expo:cubic-bezier(0.19,1,0.22,1);--ease-out-cubic:cubic-bezier(0.215,0.61,0.355,1)}
    html{background:var(--color-void);font-size:.5208333333vw;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
    body{font:1.6rem/1.3 "Azeret Mono",monospace;background:var(--color-void);opacity:0;transition:opacity .6s ease;cursor:none;overflow-x:clip}
    body.loaded{opacity:1}

    /* Cursor */
    .cursor{position:fixed;top:0;left:0;z-index:9999;width:7px;height:7px;background:var(--color-sun);border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);mix-blend-mode:exclusion;will-change:transform;transition:width .25s ease,height .25s ease}
    .cursor.big{width:48px;height:48px}
    .cursor-ring{position:fixed;top:0;left:0;z-index:9998;width:28px;height:28px;border:1px solid rgba(255,254,0,.35);border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);will-change:transform;transition:width .3s ease,height .3s ease,opacity .3s ease}
    .cursor-ring.hovering{width:50px;height:50px;opacity:.45}
    .cursor-ring.hidden{opacity:0}

    /* Nav */
    .nav{position:absolute;top:0;left:0;width:100%;z-index:100;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:3.2rem 4.8rem;transition:padding .6s var(--ease-out-expo),background 1.2s var(--ease-out-cubic),transform .6s var(--ease-out-expo)}
    
    .nav__logo{text-decoration:none;opacity:0;transform:translateY(-8px);transition:opacity .6s ease,transform .6s var(--ease-out-expo);display:flex;justify-content:center}
    .nav__logo.in{opacity:1;transform:translateY(0)}
    .nav__logo img{height:16rem;width:auto;display:block;filter:invert(1) url(#logo-yellow);mix-blend-mode:screen;transition:filter .6s ease}
    .nav__left{display:flex;align-items:center}
    .nav__links{display:flex;align-items:center;justify-content:flex-end;gap:.8rem;list-style:none}
    .nav__links li{opacity:0;transform:translateY(-8px);transition:opacity .6s ease,transform .6s var(--ease-out-expo)}
    .nav__links li.in{opacity:1;transform:translateY(0)}
    .nav__links a{display:inline-block;font-family:'Joyride',"Azeret Mono",monospace;font-size:1.1rem;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:rgba(218,255,0,.45);text-decoration:none;padding:.9rem 1.4rem;position:relative;transition:color .5s var(--ease-out-expo)}
    .nav__links a::after{content:'';position:absolute;bottom:4px;left:1.4rem;right:1.4rem;height:1px;background:var(--color-sun);transform:scaleX(0);transform-origin:right;transition:transform .5s var(--ease-out-expo)}
    .nav__links a:hover{color:var(--color-sun)}
    .nav__links a:hover::after{transform:scaleX(1);transform-origin:left}
    .nav__dropdown{position:relative}
    .nav__dropdown__menu{position:absolute;top:100%;left:1.4rem;transform:translateY(-6px);list-style:none;min-width:10rem;opacity:0;pointer-events:none;transition:opacity .25s ease,transform .3s var(--ease-out-expo);z-index:200;padding-top:.8rem}
    .nav__dropdown:hover .nav__dropdown__menu{opacity:1;pointer-events:all;transform:translateY(0)}
    .nav__dropdown__menu a{display:inline-block;padding:.5rem 0;font-family:'Joyride',"Azeret Mono",monospace;font-size:1.1rem;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:rgba(218,255,0,.45);text-decoration:none;transition:color .2s}
    .nav__dropdown__menu a::after{left:0;right:0;bottom:0}
    .nav__dropdown__menu a:hover{color:var(--color-sun)}
    .nav__menu-btn{display:none;flex-direction:column;justify-content:center;gap:5px;width:32px;height:32px;background:none;border:none;cursor:none;padding:0}
    .nav__menu-btn span{display:block;width:100%;height:1px;background:var(--color-ivory);transition:transform .5s var(--ease-out-expo),opacity .3s ease}
    .nav--open .nav__menu-btn span:nth-child(1){transform:translateY(6px) rotate(45deg)}
    .nav--open .nav__menu-btn span:nth-child(2){opacity:0;transform:scaleX(0)}
    .nav--open .nav__menu-btn span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}

    /* Mobile Menu */
    .menu-overlay{position:fixed;inset:0;z-index:190;background:var(--color-void);display:flex;flex-direction:column;justify-content:center;padding:4.8rem;opacity:0;visibility:hidden;transition:opacity .5s var(--ease-out-expo),visibility .5s ease}
    .menu-overlay.open{opacity:1;visibility:visible}
    .menu-overlay__links{list-style:none;display:flex;flex-direction:column;gap:1.6rem}
    .menu-overlay__links li{overflow:hidden}
    .menu-overlay__links a{display:block;font-family:'Joyride',"Azeret Mono",monospace;font-size:6rem;font-weight:400;letter-spacing:.05em;text-transform:uppercase;color:var(--color-ivory);text-decoration:none;transform:translateY(110%);transition:transform 1.2s var(--ease-out-expo),color .3s ease}
    .menu-overlay.open .menu-overlay__links a{transform:translateY(0)}
    .menu-overlay__links a:hover{color:var(--color-sun)}
    .menu-overlay__footer{position:absolute;bottom:4rem;left:4.8rem;right:4.8rem;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(255,251,242,.1);padding-top:2.4rem;opacity:0;transition:opacity .6s ease .4s}
    .menu-overlay.open .menu-overlay__footer{opacity:1}
    .menu-overlay__contact{font-size:1.4rem;font-weight:300;color:rgba(255,251,242,.4);text-decoration:none;transition:color .3s}
    .menu-overlay__contact:hover{color:var(--color-sun)}
    .menu-overlay__offices{font-size:1.2rem;font-weight:300;color:rgba(255,251,242,.25);text-align:right;line-height:1.8}

    /* Hero */
    .keyart-hero{height:55vh;min-height:40rem;display:flex;flex-direction:column;justify-content:flex-end;padding:4.8rem;padding-bottom:5.6rem;position:relative;overflow:hidden;background:var(--color-void)}
    #heroShaderKeyart{position:absolute;inset:0;z-index:0}
    #heroShaderKeyart canvas{width:100%!important;height:100%!important;display:block}
    .keyart-hero__overlay{position:absolute;inset:0;background:rgba(0,0,0,.62);z-index:1}
    .keyart-hero__noise{position:absolute;inset:0;z-index:2;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:256px 256px;pointer-events:none}
    .keyart-hero__label{position:relative;z-index:3;display:flex;align-items:center;gap:1.6rem;font-size:1.1rem;font-weight:300;letter-spacing:.2em;text-transform:uppercase;color:rgba(218,255,0,.5);margin-bottom:3.2rem}
    .keyart-hero__label::before{content:'';display:block;width:4rem;height:1px;background:rgba(218,255,0,.3);flex-shrink:0;opacity:0;transition:opacity .6s ease 1s}
    body.loaded .keyart-hero__label::before{opacity:1}
    .keyart-hero__label__text{overflow:hidden}
    .keyart-hero__label__inner{display:block;transform:translateY(100%);transition:transform 1s var(--ease-out-expo) 1s}
    body.loaded .keyart-hero__label__inner{transform:translateY(0)}
    .keyart-hero__title{position:relative;z-index:3;font-family:'Joyride',"Azeret Mono",monospace;font-size:clamp(5.6rem,9vw,14rem);font-weight:400;line-height:.88;letter-spacing:.01em;text-transform:uppercase;color:var(--color-ivory)}
    .keyart-hero__title .hl{display:block;overflow:hidden}
    .keyart-hero__title .hl__inner{display:block;transform:translateY(110%);transition:transform 1.1s var(--ease-out-expo)}
    body.loaded .keyart-hero__title .hl__inner{transform:translateY(0);transition-delay:.3s}
    .alt-r{font-family:'JoyrideALT',"Azeret Mono",monospace}

    /* Gallery */
    .keyart-gallery{background:var(--color-void);padding:.8rem}
    .keyart-masonry{position:relative}
    .keyart-item{position:absolute;overflow:hidden;cursor:none}
    .keyart-item img{width:100%;display:block;transition:transform 1.2s var(--ease-out-expo),filter .6s ease}
    .keyart-item::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .5s ease}
    .keyart-item:hover img{transform:scale(1.04)}
    .keyart-item:hover::after{background:rgba(0,0,0,.15)}

    /* Lightbox */
    .lightbox{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.96);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .4s ease,visibility .4s ease}
    .lightbox.open{opacity:1;visibility:visible}
    .lightbox__inner{position:relative;max-width:90vw;max-height:90vh;display:flex;align-items:center;justify-content:center}
    .lightbox__img{max-width:90vw;max-height:90vh;object-fit:contain;display:block;transform:scale(.96);transition:transform .5s var(--ease-out-expo)}
    .lightbox.open .lightbox__img{transform:scale(1)}
    .lightbox__close{position:fixed;top:3.2rem;right:3.2rem;width:4.8rem;height:4.8rem;background:none;border:1px solid rgba(255,251,242,.2);color:var(--color-ivory);font-size:2rem;cursor:none;display:flex;align-items:center;justify-content:center;transition:border-color .3s,color .3s}
    .lightbox__close:hover{border-color:var(--color-sun);color:var(--color-sun)}
    .lightbox__nav{position:fixed;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,251,242,.3);font-size:3.2rem;cursor:none;padding:2.4rem;transition:color .3s}
    .lightbox__nav:hover{color:var(--color-sun)}
    .lightbox__nav--prev{left:2.4rem}
    .lightbox__nav--next{right:2.4rem}
    .lightbox__counter{position:fixed;bottom:3.2rem;left:50%;transform:translateX(-50%);font-size:1.1rem;font-weight:300;letter-spacing:.12em;color:rgba(255,251,242,.25)}

    /* Footer */
    .scroll-hint{position:absolute;bottom:4rem;right:4.8rem;z-index:10;display:flex;flex-direction:column;align-items:center;opacity:0;transition:opacity .8s ease 2s}body.loaded .scroll-hint{opacity:1}.scroll-hint svg{animation:scrollBounce 1.8s ease-in-out infinite}@keyframes scrollBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
    footer{background:var(--color-void);padding:4rem 4.8rem;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,251,242,.05);position:relative}
    .footer__logo{position:absolute;left:50%;transform:translateX(-50%)}
    .footer__logo img{height:8rem;width:auto;display:block;filter:invert(1) url(#logo-yellow);mix-blend-mode:screen;opacity:.6}
    .footer__copy{font-size:1.1rem;font-weight:300;color:rgba(255,251,242,.15);letter-spacing:.04em}
    .footer__links{display:flex;gap:2.4rem;list-style:none;align-items:center}
    .footer__links a{display:flex;align-items:center;justify-content:center;color:rgba(255,251,242,.25);text-decoration:none;transition:color .3s}
    .footer__links a:hover{color:rgba(255,251,242,.75)}
    .footer__links svg{display:block}

    /* Reveals */
    .reveal{opacity:0;transform:translateY(3.2rem);transition:opacity .9s var(--ease-out-expo),transform .9s var(--ease-out-expo)}
    .reveal.in-view{opacity:1;transform:translateY(0)}
    .reveal-d1{transition-delay:.12s}
    .reveal-d2{transition-delay:.24s}

    /* Responsive */
    @media(max-width:768px){
      html{font-size:1.8vw}
      .nav{padding:2.4rem}.nav__logo img{height:22vw}.nav__menu-btn{width:28px;height:28px}
      .nav__links{display:none}
      .nav__menu-btn{display:flex}
      .menu-overlay__links a{font-size:11vw}
      .keyart-hero{padding:2.4rem;padding-bottom:5.6rem}
      .keyart-masonry{columns:2}
      .keyart-hero__meta{flex-direction:column;gap:2.4rem;align-items:flex-start}
      .keyart-hero__desc{text-align:left}
      footer{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:1.6rem 0;padding:3.2rem 2.4rem;text-align:left}.footer__logo{order:-1;flex:0 0 100%;display:flex;justify-content:center;position:static;transform:none}.footer__copy{order:1}.footer__links{order:1;justify-content:flex-end}
    }
    @media(min-width:769px) and (max-width:1200px){
      html{font-size:.7vw}
      .keyart-masonry{columns:2}
    }
    @media(hover:none) and (pointer:coarse){
      .cursor,.cursor-ring{display:none!important}
      body{cursor:auto}
    }
  </style>
</head>

  <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
  <script>
  (function(){
    const container=document.getElementById('heroShaderKeyart');
    if(!container||typeof THREE==='undefined')return;
    const camera=new THREE.Camera();
    camera.position.z=1;
    const scene=new THREE.Scene();
    const geometry=new THREE.PlaneGeometry(2,2);
    const uniforms={time:{value:1.0},resolution:{value:new THREE.Vector2()}};
    const material=new THREE.ShaderMaterial({
      uniforms,
      vertexShader:`void main(){gl_Position=vec4(position,1.0);}`,
      fragmentShader:`
        precision highp float;
        uniform vec2 resolution;
        uniform float time;
        void main(void){
          vec2 uv=(gl_FragCoord.xy*2.0-resolution.xy)/min(resolution.x,resolution.y);
          float t=time*0.05;
          float lineWidth=0.0015;
          vec3 color=vec3(0.0);
          for(int j=0;j<3;j++){
            for(int i=0;i<5;i++){
              color[j]+=lineWidth*float(i*i)/abs(
                fract(t-0.008*float(j)+float(i)*0.012)*5.0
                -length(uv)
                +mod(uv.x+uv.y,0.2)
              );
            }
          }
          vec3 tint=vec3(0.231,0.008,0.302);
          color=color*tint*2.8;
          gl_FragColor=vec4(color,1.0);
        }
      `
    });
    const mesh=new THREE.Mesh(geometry,material);
    scene.add(mesh);
    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    container.appendChild(renderer.domElement);
    function resize(){
      const w=container.clientWidth,h=container.clientHeight;
      renderer.setSize(w,h);
      uniforms.resolution.value.set(renderer.domElement.width,renderer.domElement.height);
    }
    resize();
    window.addEventListener('resize',resize);
    (function animate(){requestAnimationFrame(animate);uniforms.time.value+=0.05;renderer.render(scene,camera)})();
  })();
  </script>
  <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>
  <script>
  (function(){
    const qs=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];

    const lenis=new Lenis({duration:1.25,easing:t=>Math.min(1,1.001-Math.pow(2,-10*t)),smoothTouch:false});
    (function raf(t){lenis.raf(t);requestAnimationFrame(raf)})(0);

    const cursor=qs('#cursor'),ring=qs('#cursorRing');
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px'});
    (function anim(){rx+=(mx-rx)*.09;ry+=(my-ry)*.09;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(anim)})();

    const allInteractive=()=>$$('a,button,.keyart-item');
    const bindCursor=()=>allInteractive().forEach(el=>{
      el.addEventListener('mouseenter',()=>{ring.classList.add('hovering');cursor.classList.add('big')});
      el.addEventListener('mouseleave',()=>{ring.classList.remove('hovering');cursor.classList.remove('big')});
    });
    bindCursor();
    document.addEventListener('mouseleave',()=>ring.classList.add('hidden'));
    document.addEventListener('mouseenter',()=>ring.classList.remove('hidden'));

    const nav=qs('#nav'),navLogo=qs('#navLogo'),navItems=$$('#navLinks li');

    lenis.on('scroll',({scroll,direction})=>{


    });

    const menuBtn=qs('#menuBtn'),menuOverlay=qs('#menuOverlay');
    $$('[data-menu-link]').forEach((a,i)=>{a.style.transitionDuration=(1200-i*60)+'ms';a.style.transitionDelay=(i*70)+'ms'});
    const openMenu=()=>{nav.classList.add('nav--open');menuOverlay.classList.add('open');lenis.stop()};
    const closeMenu=()=>{nav.classList.remove('nav--open');menuOverlay.classList.remove('open');lenis.start()};
    menuBtn.addEventListener('click',()=>menuOverlay.classList.contains('open')?closeMenu():openMenu());
    $$('[data-menu-link]').forEach(a=>a.addEventListener('click',closeMenu));

    // Masonry: left-to-right
    const grid=qs('.keyart-masonry');
    function masonry(){
      const items=$$('.keyart-item');
      if(!grid||!items.length)return;
      const gap=8;
      const w=grid.offsetWidth;
      const cols=window.innerWidth<=768?2:window.innerWidth<=1200?2:3;
      const colW=(w-gap*(cols-1))/cols;
      const heights=new Array(cols).fill(0);
      items.forEach(item=>{
        const col=heights.indexOf(Math.min(...heights));
        item.style.width=colW+'px';
        item.style.left=(col*(colW+gap))+'px';
        item.style.top=heights[col]+'px';
        heights[col]+=item.offsetHeight+gap;
      });
      grid.style.height=(Math.max(...heights)-gap)+'px';
    }
    $$('.keyart-item img').forEach(img=>{
      if(img.complete)masonry();
      else img.addEventListener('load',masonry);
    });
    window.addEventListener('resize',masonry);
    masonry();

    requestAnimationFrame(()=>requestAnimationFrame(()=>requestAnimationFrame(()=>{
      document.body.classList.add('loaded');
      navLogo.classList.add('in');
      navItems.forEach((li,i)=>setTimeout(()=>li.classList.add('in'),80*i));
    })));

    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in-view');obs.unobserve(e.target)}});
    },{threshold:.1,rootMargin:'0px 0px -4% 0px'});
    $$('.reveal').forEach(el=>obs.observe(el));

    // Lightbox
    const items=$$('.keyart-item');
    const lb=qs('#lightbox'),lbImg=qs('#lbImg'),lbClose=qs('#lbClose'),lbPrev=qs('#lbPrev'),lbNext=qs('#lbNext'),lbCounter=qs('#lbCounter');
    let current=0;

    const openLb=i=>{
      current=i;
      const img=items[i].querySelector('img');
      lbImg.src=img.src;
      lbImg.alt=img.alt;
      lbCounter.textContent=(i+1)+' / '+items.length;
      lb.classList.add('open');
      lenis.stop();
    };
    const closeLb=()=>{lb.classList.remove('open');lenis.start()};
    const showPrev=()=>openLb((current-1+items.length)%items.length);
    const showNext=()=>openLb((current+1)%items.length);

    items.forEach((item,i)=>item.addEventListener('click',()=>openLb(i)));
    lbClose.addEventListener('click',closeLb);
    lbPrev.addEventListener('click',showPrev);
    lbNext.addEventListener('click',showNext);
    lb.addEventListener('click',e=>{if(e.target===lb)closeLb()});
    document.addEventListener('keydown',e=>{
      if(!lb.classList.contains('open'))return;
      if(e.key==='Escape')closeLb();
      if(e.key==='ArrowLeft')showPrev();
      if(e.key==='ArrowRight')showNext();
    });
  })();
  </script>
